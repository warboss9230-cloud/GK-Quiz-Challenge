<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultimate Quiz Pro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<canvas id="particles"></canvas>

<div class="app">

<h1>🧠 Ultimate Quiz</h1>

<div id="startScreen">

<input id="playerName" placeholder="Enter Your Name">

<button onclick="startGame()">Start Game</button>

</div>

<div id="menu" class="hidden">

<button onclick="startMode('free')">🎮 Free Play</button>

<button onclick="startMode('timer')">⏱ Timer Mode</button>

<button onclick="startMode('level')">🧠 Level Mode</button>

<button onclick="startMode('daily')">📅 Daily Quiz</button>

</div>

<div id="quizBox" class="hidden">

<div class="top">

<div>Score: <span id="score">0</span></div>
<div>XP: <span id="xp">0</span></div>
<div>Level: <span id="playerLevel">1</span></div>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<h2 id="question"></h2>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>

<div id="resultBox" class="hidden">

<h2>Quiz Complete</h2>

<h1 id="finalScore"></h1>

<div id="achievements"></div>

<h3>🏆 Leaderboard</h3>

<div id="leaderboard"></div>

<button onclick="location.reload()">Play Again</button>

</div>

</div>

<script src="js/script.js"></script>

</body>
  </html>
